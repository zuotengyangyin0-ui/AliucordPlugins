name: Build Plugins

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # メインリポジトリのチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: "src"

      # JDK 21 のセットアップ
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      # Gradle のセットアップ
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # ビルド実行
      - name: Build plugins
        run: |
          cd $GITHUB_WORKSPACE/src
          chmod +x gradlew
          ./gradlew make generateUpdaterJson
          
          # ビルド成果物を artifacts フォルダにまとめる
          mkdir -p $GITHUB_WORKSPACE/artifacts
          cp **/build/outputs/*.zip $GITHUB_WORKSPACE/artifacts/
          cp build/outputs/updater.json $GITHUB_WORKSPACE/artifacts/

      # Actions UI でダウンロードできるように artifacts アップロード
      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: $GITHUB_WORKSPACE/artifacts
