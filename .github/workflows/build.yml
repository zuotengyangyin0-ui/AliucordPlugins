name: Build Plugins

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # リポジトリのチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: "src"

      # JDK 21 セットアップ
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      # Gradle セットアップ
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # ビルド実行
      - name: Build plugins
        run: |
          cd $GITHUB_WORKSPACE/src
          chmod +x gradlew
          ./gradlew make generateUpdaterJson

      # デバッグ: 生成物の存在を確認
      - name: Debug build outputs
        run: |
          echo "Listing build outputs:"
          ls -R $GITHUB_WORKSPACE/src

      # artifacts フォルダに成果物を集める
      - name: Collect artifacts
        run: |
          mkdir -p $GITHUB_WORKSPACE/artifacts
          cp $(find $GITHUB_WORKSPACE/src -name "*.zip") $GITHUB_WORKSPACE/artifacts/ || echo "No zip files found"
          cp $(find $GITHUB_WORKSPACE/src -name "updater.json") $GITHUB_WORKSPACE/artifacts/ || echo "No updater.json found"

      # アップロード
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-assets
          path: $GITHUB_WORKSPACE/artifacts
