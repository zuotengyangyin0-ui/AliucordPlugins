name: Build Plugins

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # リポジトリをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: "src"

      # JDK 21 セットアップ
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      # Gradle を runner にインストール
      - name: Install Gradle
        run: |
          sudo apt update
          sudo apt install -y gradle

      # 利用可能な Gradle タスクを確認
      - name: List available Gradle tasks
        run: |
          cd $GITHUB_WORKSPACE/src/EditEverything
          gradle tasks

      # プラグインビルド（存在するタスクで）
      - name: Build plugin
        run: |
          cd $GITHUB_WORKSPACE/src/EditEverything
          # assemble タスクを使うのが一般的
          gradle assemble

      # デバッグ: ビルド成果物を確認
      - name: Debug build outputs
        run: |
          echo "Listing all files in EditEverything:"
          find $GITHUB_WORKSPACE/src/EditEverything -type f

      # artifacts フォルダに成果物を集める
      - name: Collect artifacts
        run: |
          mkdir -p $GITHUB_WORKSPACE/artifacts
          find $GITHUB_WORKSPACE/src -name "*.zip" -exec cp {} $GITHUB_WORKSPACE/artifacts/ \;
          find $GITHUB_WORKSPACE/src -name "updater.json" -exec cp {} $GITHUB_WORKSPACE/artifacts/ \;

      # artifacts を GitHub Actions にアップロード
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-assets
          path: $GITHUB_WORKSPACE/artifacts
