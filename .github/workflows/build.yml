name: Build Plugins

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # リポジトリのチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: "src"

      # JDK 21 セットアップ
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      # Gradle セットアップ
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # ビルド実行
      - name: Build plugins
        run: |
          cd $GITHUB_WORKSPACE/src
          chmod +x gradlew
          ./gradlew make generateUpdaterJson

      # デバッグ: どこにファイルがあるか確認
      - name: Debug build outputs
        run: |
          echo "Listing all files in src:"
          find $GITHUB_WORKSPACE/src -type f

      # artifacts フォルダに成果物を集める（存在するファイルのみ）
      - name: Collect artifacts
        run: |
          mkdir -p $GITHUB_WORKSPACE/artifacts
          find $GITHUB_WORKSPACE/src -name "*.zip" -exec cp {} $GITHUB_WORKSPACE/artifacts/ \;
          find $GITHUB_WORKSPACE/src -name "updater.json" -exec cp {} $GITHUB_WORKSPACE/artifacts/ \;

      # artifacts をアップロード
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-assets
          path: $GITHUB_WORKSPACE/artifacts
