name: Build Plugins

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # リポジトリをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: "src"

      # JDK 21 をセットアップ
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      # Gradle セットアップ
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # gradlew の場所を確認
      - name: Find gradlew
        run: |
          echo "Searching for gradlew..."
          find $GITHUB_WORKSPACE/src -name "gradlew"

      # プラグインビルド（gradlew があれば wrapper、なければ gradle）
      - name: Build plugins
        run: |
          BUILD_DIR=$(find $GITHUB_WORKSPACE/src -name "gradlew" -exec dirname {} \;)
          if [ -n "$BUILD_DIR" ]; then
            echo "Using gradlew in $BUILD_DIR"
            cd "$BUILD_DIR"
            chmod +x gradlew
            ./gradlew make generateUpdaterJson
          else
            echo "gradlew not found, trying gradle command..."
            cd $GITHUB_WORKSPACE/src/EditEverything || cd $GITHUB_WORKSPACE/src
            gradle make generateUpdaterJson
          fi

      # デバッグ: ビルド成果物を確認
      - name: Debug build outputs
        run: |
          echo "Listing all files in src:"
          find $GITHUB_WORKSPACE/src -type f

      # artifacts フォルダに成果物を集める
      - name: Collect artifacts
        run: |
          mkdir -p $GITHUB_WORKSPACE/artifacts
          find $GITHUB_WORKSPACE/src -name "*.zip" -exec cp {} $GITHUB_WORKSPACE/artifacts/ \;
          find $GITHUB_WORKSPACE/src -name "updater.json" -exec cp {} $GITHUB_WORKSPACE/artifacts/ \;

      # artifacts をアップロード
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-assets
          path: $GITHUB_WORKSPACE/artifacts
